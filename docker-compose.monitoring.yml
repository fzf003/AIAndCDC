# Debezium 监控 Dashboard
# 使用：docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d

services:
  # Prometheus - 收集指标
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - cdc-network

  # Grafana - 可视化 Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - cdc-network

  # Exporter - Debezium 指标导出
  debezium-exporter:
    image: quay.io/debezium/server:2.6
    container_name: debezium-exporter
    restart: unless-stopped
    environment:
      - QUARKUS_HTTP_PORT=8080
      - QUARKUS_HTTP_HOST=0.0.0.0
    volumes:
      - ./debezium/application.properties:/debezium/conf/application.properties:ro
    command: ["--version"] # 仅用于暴露指标端点
    networks:
      - cdc-network

volumes:
  prometheus-data:
  grafana-data:

networks:
  cdc-network:
    driver: bridge
